<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>jeweldesign | hikki photography</title>

  <link rel="canonical" href="https://hikki.ca/jewel.html">
  <meta name="robots" content="index,follow"/>
  <meta name="description" content="jeweldesign — hand-carved silver rings by hikki photography &amp; philosophy. reimagined, one of one, cast in macau."/>
  <meta name="theme-color" content="#161616"/>
  <meta property="og:title" content="jeweldesign | hikki photography"/>
  <meta property="og:description" content="hand-carved silver rings. reimagined, one of one."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://hikki.ca/jewel.html"/>
  <meta property="og:site_name" content="hikki photography &amp; philosophy"/>
  <meta property="og:image" content="https://hikki.ca/favicon.png"/>

  <link rel="icon" href="/favicon.png" type="image/png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="site.css?v=6"/>
  <script src="site.js?v=6" defer></script>
  <script src="game-logos.js?v=6"></script>
  <!-- Google model-viewer（自托管，冇第三方依賴） -->
  <script type="module" src="model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --hk-bar-alpha: 0.92; --char: #161616; }
    html, body {
      height: 100%;
      background: var(--char); color: var(--hk-ivory);
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body { font-family: var(--hk-font-mono); }
    .blink-block { display: inline-block; animation: hkBlink 3s infinite; }

    /* ===== 桌面：戒指精準貫穿標題正中（sohub 式） ===== */
    .stage {
      position: fixed; inset: 0;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: calc(var(--hk-bar-h) + clamp(10px, 2vh, 24px)) var(--hk-pad-x) clamp(16px, 3vh, 32px);
      max-width: 1440px; margin: 0 auto; width: 100%;
      left: 50%; transform: translateX(-50%);
    }

    /* hero：戒指佔滿 header 以下、meta 以上嘅全部空間；標題+詩句靠左疊喺上層 */
    .hero {
      flex: 1; min-height: 0; position: relative;
    }

    /* 標題 + 詩句：靠左，垂直置於戒指預設高度約一半，戒指覆疊 */
    .title-block {
      position: absolute; left: 0; right: 0; z-index: 1;
      top: 50%; transform: translateY(-52%);
      pointer-events: none;
    }
    h1 {
      font-family: var(--hk-font-sans); font-weight: bold;
      font-size: clamp(72px, min(15vw, 25vh), 264px);
      line-height: 0.84; letter-spacing: -0.03em;
      color: var(--hk-ivory);
      white-space: nowrap;
      position: relative; left: -0.04ch;
      /* 大標題鎖死：不可選、不接收點擊，避免誤點阻礙拖拉 */
      user-select: none; -webkit-user-select: none; pointer-events: none;
    }
    .haiku {
      margin-top: clamp(0px, 0.3vh, 4px);        /* 更貼近標題 */
      font-family: var(--hk-font-ja); font-weight: 200;
      font-size: clamp(13px, 1.62vw, 23px); line-height: 1.5;   /* 桌面放大（比原 20px 大） */
      letter-spacing: 0.04em; text-align: left;
      color: rgba(244,242,240,.82);
      max-width: 40%;                             /* 喺 reima 之後、g 勾子之前收筆 */
      white-space: nowrap;
    }

    /* 模型：填滿整個 hero，攞盡展示空間 */
    .mv-wrap {
      position: absolute; inset: 0; z-index: 2;
    }
    model-viewer {
      width: 100%; height: 100%;
      --poster-color: transparent;
      background: transparent;
      outline: none;
    }

    /* 載入遮罩：乾卦六爻進度條（iching 燈箱風，橙色） */
    .mv-mask {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity .4s ease; opacity: 1;
    }
    .mv-mask.off { opacity: 0; }
    .load-hex {
      display: flex; flex-direction: column-reverse; gap: 6px;
      width: clamp(96px, 12vw, 150px);
    }
    .load-hex i {
      display: block; height: 7px;
      background: rgba(247,134,31,.14);
      transition: background .3s ease, box-shadow .3s ease;
    }
    .load-hex i.on {
      background: #f7861f;                                   /* 橙 */
      box-shadow: 0 0 5px rgba(247,134,31,.6), 0 0 18px rgba(247,134,31,.28); /* 燈箱透光 */
    }
    .load-pct {
      margin-top: 12px;
      font-family: var(--hk-font-mono); font-size: 12px; letter-spacing: 0.04em;
      color: #f7861f; text-align: center;
    }

    /* 下段：左小標題+切換｜中 ASCII 燈箱｜右規格
       ad 同 specs 用固定同闊欄，切換戒指時位置永遠唔郁 */
    .meta-row {
      position: relative; z-index: 4;
      --mcol: clamp(206px, 18vw, 236px);
      display: grid;
      grid-template-columns: 1fr var(--mcol) var(--mcol);
      grid-template-areas: "sub ad specs";
      gap: clamp(20px, 4vw, 56px); align-items: end;
    }
    .left  { grid-area: sub; }
    .specs { grid-area: specs; }

    /* ASCII 燈箱（用 game 嘅 LOGOS，ivory 色）；置中、與資訊欄同闊、底部對齊 */
    .ad {
      grid-area: ad; position: relative; overflow: hidden;
      width: 100%; height: 88px; align-self: end;
    }
    .ad-wrap { position: absolute; inset: 0; }
    .ad-logo {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transform-origin: 50% 50%;
      white-space: pre; margin: 0; line-height: 1;
      font-family: var(--hk-font-mono); font-size: 8px;
      color: rgba(244,242,240,.5);
      pointer-events: none;
    }
    .sub {
      font-family: var(--hk-font-sans); font-weight: bold;
      font-size: clamp(19px, 2.4vw, 32px); line-height: 1.18;
      letter-spacing: -0.01em; text-decoration: underline;
      color: var(--hk-ivory); max-width: 15em;
    }
    /* 戒指名單：字細一級（13→12），移到左欄最底；升高啲，唔好貼住下方版權 */
    .switch { margin-top: 12px; font-size: 12px; position: relative; top: -4px; }
    .switch button {
      appearance: none; border: 0; background: none; cursor: pointer;
      font-family: var(--hk-font-mono); font-size: 12px;
      color: rgba(244,242,240,.55); padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color .2s, border-color .2s;
      touch-action: manipulation;
    }
    .switch button:hover { color: var(--hk-gold); }
    .switch button.on { color: var(--hk-ivory); border-bottom-color: var(--hk-ivory); }
    .switch .sep { color: rgba(244,242,240,.35); margin: 0 8px; }

    .specs {
      width: 100%;
      font-family: var(--hk-font-mono); font-size: 11px; line-height: 1.85;
      letter-spacing: -0.01em; white-space: pre; overflow: hidden;
      color: rgba(244,242,240,.88);
      text-align: left;
    }

    /* 版權：桌面在 pinch-to-zoom 下面（bottom-left），手機在頁面底部 */
    .copyright {
      position: relative; z-index: 4;
      margin-top: clamp(8px, 1.4vh, 14px);
      font-family: var(--hk-font-mono); font-size: 11px; letter-spacing: -0.005em;
      color: rgba(244,242,240,.5);
    }

    /* ===== 手機：header 下 2/3 標題+詩句+戒指，下 1/3 = 左副標題+戒指名 / 右資訊 ===== */
    @media (max-width: 767px) and (orientation: portrait) {
      html, body { overflow: hidden; }
      .stage {
        position: fixed; inset: 0; left: 0; transform: none;
        height: 100dvh;
        padding: calc(var(--hk-bar-h) + 12px) 20px 16px;
      }
      .hero { flex: 1 1 auto; min-height: 0; }     /* grow：戒指佔上方大部分 */
      h1 { font-size: min(16vw, 96px); white-space: normal; text-align: left; line-height: 0.88; }
      .haiku { font-size: 11px; line-height: 1.6; max-width: 46%; }   /* 手機縮小、貼近標題、g 勾子前收筆 */
      .meta-row {
        flex: 0 0 auto; min-height: 0;
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "sub  specs"
          "sub  ad";                               /* 資訊在上、燈箱在下（換位） */
        gap: 10px 14px;
        align-items: end; align-content: end;
      }
      /* 左欄撐滿高度：副標題釘頂（同資訊欄頂平齊），戒指名單推到底
         （與右邊球體容器底部平齊） */
      .left { align-self: stretch; display: flex; flex-direction: column; }
      .sub { font-size: 16px; max-width: none; line-height: 1.2; }
      .switch { margin-top: auto; font-size: 12px; }
      .switch .sep { display: none; }              /* 手機唔用 / 分隔 */
      .switch button { display: block; }           /* 戒指名直排 */
      .switch { top: 0; }                          /* 手機唔用桌面嘅挪低 */
      .specs { font-size: 9.5px; line-height: 1.75; }
      .ad { width: min(46vw, 210px); height: 60px; justify-self: end; align-self: end; }
      /* 版權：整個下方結構升起，版權留喺頁面底部 */
      .copyright { flex: 0 0 auto; margin-top: clamp(12px, 3vh, 26px); font-size: 10px; }
    }
  </style>
</head>
<body>

  <main class="stage">
    <div class="hero">
      <div class="mv-wrap">
        <model-viewer id="mv"
          src="models/ring-signet.glb"
          alt="hand-carved silver ring — signet"
          camera-controls
          auto-rotate auto-rotate-delay="3500" rotation-per-second="14deg"
          interaction-prompt="none"
          exposure="1.15" shadow-intensity="0.5" shadow-softness="0.85"
          environment-image="neutral"
          loading="eager">
        </model-viewer>
        <div class="mv-mask" id="mvMask" aria-hidden="true">
          <div class="load-hex" id="loadHex"><i></i><i></i><i></i><i></i><i></i><i></i></div>
          <div class="load-pct"><span id="mvPct">0</span>%</div>
        </div>
      </div>

      <div class="title-block">
        <h1 id="title">reimagined.</h1>
        <p class="haiku" lang="ja">さびしさや　一尺消えて　ゆくほたる</p>
      </div>
    </div>

    <div class="meta-row">
      <div class="left">
        <h2 class="sub" id="sub">every piece designed, casted &amp; polished to perfect — all by local masters.</h2>
        <div class="switch" id="switch">
          <button data-ring="camellia">&gt;no.63-G camellia</button><span class="sep">/</span><button class="on" data-ring="signet">&gt;no.103-F signet</button>
        </div>
      </div>
      <div class="ad" aria-hidden="true"><div class="ad-wrap" id="adWrap"></div></div>
      <div class="specs" id="specs"></div>
    </div>

    <p class="copyright" id="copyright">© 2026 hikki photography &amp; philosophy.</p>
  </main>

  <script>
  window.addEventListener('DOMContentLoaded', function () {
    var mv = document.getElementById('mv');
    var mask = document.getElementById('mvMask');
    var pct = document.getElementById('mvPct');
    var specsEl = document.getElementById('specs');

    /* ===== 兩隻戒指嘅資料（佔位文案，隨時改） ===== */
    var RINGS = {
      camellia: {
        src: 'models/ring-camellia.glb',
        specs: [
          'OBJECT   no.63-G — camellia',
          'DESIGN   Alexandra',
          'BODY     sterling silver 925',
          'SIZE     made to order',
          'ORIGIN   victoria B.C.',
          'STATUS   contact for detail ■'
        ].join('\n')
      },
      signet: {
        src: 'models/ring-signet.glb',
        specs: [
          'OBJECT   no.103-F — signet',
          'DESIGN   Alexandra',
          'BODY     sterling silver 925',
          'SIZE     8+',
          'ORIGIN   victoria B.C.',
          'STATUS   contact for detail ■'
        ].join('\n')
      }
    };

    function setSpecs(key) {
      /* 先跑解碼（純文字），完成後把結尾方塊換成閃動 span */
      specsEl.textContent = RINGS[key].specs;
      if (window.HikkiCrack) window.HikkiCrack.startOn(window.HikkiCrack.collect(specsEl), { budgetMs: 500 });
      setTimeout(function () {
        specsEl.innerHTML = RINGS[key].specs
          .replace(/[&<>]/g, function (m) { return { '&':'&amp;','<':'&lt;','>':'&gt;' }[m]; })
          .replace('■', '<span class="blink-block">■</span>');
      }, 620);
    }

    /* ===== 載入遮罩：乾卦六爻進度條（橙色燈箱） ===== */
    var loadHex = document.getElementById('loadHex');
    var hexBars = loadHex ? loadHex.querySelectorAll('i') : [];
    var maskTimer = 0;
    function setHex(n) {                       /* 由下至上亮起 n 爻 */
      for (var i = 0; i < hexBars.length; i++) hexBars[i].classList.toggle('on', i < n);
    }
    function hideMask() {
      clearTimeout(maskTimer);
      setHex(6); pct.textContent = '100';
      mask.classList.add('off');
    }
    function showMask() {
      mask.classList.remove('off');
      setHex(0); pct.textContent = '0';
      clearTimeout(maskTimer);
      maskTimer = setTimeout(hideMask, 8000);  /* 保底：一定會消失 */
    }
    mv.addEventListener('progress', function (e) {
      var p = e.detail.totalProgress || 0;
      pct.textContent = Math.round(p * 100);
      setHex(Math.round(p * 6));
      if (p >= 1) hideMask();
    });
    mv.addEventListener('load', hideMask);      /* 決定性：模型 ready 就收遮罩 */
    mv.addEventListener('error', function () { pct.textContent = 'ERR'; });
    if (mv.loaded) hideMask();                  /* 若已 cache，即刻收 */

    /* ===== 切換戒指 ===== */
    document.getElementById('switch').addEventListener('click', function (e) {
      var b = e.target.closest('button');
      if (!b) return;
      var key = b.dataset.ring;
      document.querySelectorAll('.switch button').forEach(function (x) { x.classList.remove('on'); });
      b.classList.add('on');
      showMask();
      mv.src = RINGS[key].src;
      setSpecs(key);
    });

    /* ===== ASCII 燈箱（用 game 嘅 LOGOS，ivory 色） ===== */
    (function ascii() {
      var wrap = document.getElementById('adWrap');
      if (!wrap || typeof LOGOS === 'undefined' || !LOGOS.length) return;
      var idx = (Math.random() * LOGOS.length) | 0, el;
      function make(txt) { var p = document.createElement('pre'); p.className = 'ad-logo'; p.textContent = txt; return p; }
      /* 量度式 fit：以基準字號量實際 render 尺寸，反推可完整收納嘅字號。
         任何大致長方形嘅 ASCII 都塞得落，唔會被裁走。 */
      function fit(pre) {
        var r = wrap.getBoundingClientRect();
        var cw = Math.max(1, r.width), ch = Math.max(1, r.height);
        var BASE = 12;
        pre.style.transform = 'translate(-50%,-50%)';
        pre.style.fontSize = BASE + 'px';
        var w = Math.max(1, pre.scrollWidth), h = Math.max(1, pre.scrollHeight);
        var fs = BASE * Math.min((cw * 0.96) / w, (ch * 0.96) / h);
        fs = Math.max(2.5, Math.min(fs, 13));
        pre.style.fontSize = fs + 'px';
      }
      el = make(LOGOS[idx]); wrap.appendChild(el);
      requestAnimationFrame(function () { fit(el); });
      function swap() {
        if (document.hidden) return;
        var nx; do { nx = (Math.random() * LOGOS.length) | 0; } while (nx === idx && LOGOS.length > 1);
        wrap.style.transition = 'opacity .35s ease'; wrap.style.opacity = '0';
        setTimeout(function () { el.textContent = LOGOS[nx]; idx = nx; fit(el); wrap.style.opacity = '1'; }, 380);
      }
      setInterval(swap, 8000);
      window.addEventListener('resize', function () { if (el) requestAnimationFrame(function () { fit(el); }); });
    })();

    /* 開場：只解碼主標題（副標題唔要解碼動畫） */
    var C = window.HikkiCrack;
    if (C) {
      C.startOn(C.collect(document.getElementById('title')));
    }
    setSpecs('signet');
  });
  </script>
</body>
</html>
