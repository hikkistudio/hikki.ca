<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>jeweldesign | hikki photography</title>

  <link rel="canonical" href="https://hikki.ca/jewel.html">
  <meta name="robots" content="index,follow"/>
  <meta name="description" content="jeweldesign — hand-carved silver rings by hikki photography &amp; philosophy. reimagined, one of one, cast in macau."/>
  <meta name="theme-color" content="#161616"/>
  <meta property="og:title" content="jeweldesign | hikki photography"/>
  <meta property="og:description" content="hand-carved silver rings. reimagined, one of one."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://hikki.ca/jewel.html"/>
  <meta property="og:site_name" content="hikki photography &amp; philosophy"/>
  <meta property="og:image" content="https://hikki.ca/favicon.png"/>

  <link rel="icon" href="/favicon.png" type="image/png"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="site.css"/>
  <script src="site.js" defer></script>
  <!-- Google model-viewer（自托管，冇第三方依賴） -->
  <script type="module" src="model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --hk-bar-alpha: 0.92; --char: #161616; }
    html, body {
      height: 100%;
      background: var(--char); color: var(--hk-ivory);
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body { font-family: var(--hk-font-mono); }
    .blink-block { display: inline-block; animation: hkBlink 3s infinite; }

    /* ===== 桌面：戒指精準貫穿標題正中（sohub 式） ===== */
    .stage {
      position: fixed; inset: 0;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: calc(var(--hk-bar-h) + clamp(10px, 2vh, 24px)) var(--hk-pad-x) clamp(16px, 3vh, 32px);
      max-width: 1440px; margin: 0 auto; width: 100%;
      left: 50%; transform: translateX(-50%);
    }

    /* hero：戒指佔滿 header 以下、meta 以上嘅全部空間；標題+詩句靠左疊喺上層 */
    .hero {
      flex: 1; min-height: 0; position: relative;
    }

    /* 標題 + 詩句：靠左，垂直置於戒指預設高度約一半，戒指覆疊 */
    .title-block {
      position: absolute; left: 0; right: 0; z-index: 1;
      top: 50%; transform: translateY(-52%);
      pointer-events: none;
    }
    h1 {
      font-family: var(--hk-font-sans); font-weight: bold;
      font-size: clamp(72px, min(15vw, 25vh), 264px);
      line-height: 0.84; letter-spacing: -0.03em;
      color: var(--hk-ivory);
      white-space: nowrap;
      position: relative; left: -0.04ch;
      /* 大標題鎖死：不可選、不接收點擊，避免誤點阻礙拖拉 */
      user-select: none; -webkit-user-select: none; pointer-events: none;
    }
    .haiku {
      margin-top: clamp(2px, 0.6vh, 8px);
      font-family: var(--hk-font-ja); font-weight: 200;
      font-size: clamp(14px, 1.6vw, 20px); line-height: 1.9;
      letter-spacing: 0.08em; text-align: left;
      color: rgba(244,242,240,.82);
    }

    /* 模型：填滿整個 hero，攞盡展示空間 */
    .mv-wrap {
      position: absolute; inset: 0; z-index: 2;
    }
    model-viewer {
      width: 100%; height: 100%;
      --poster-color: transparent;
      background: transparent;
      outline: none;
    }

    /* recalibrating 載入遮罩（gallery 同款語言） */
    .mv-mask {
      position: absolute; inset: 0; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .mv-mask.off { opacity: 0; }
    .mv-mask .txt {
      text-align: center; white-space: pre;
      font-family: var(--hk-font-mono); font-size: 11px; line-height: 1.5;
      color: rgba(244,242,240,.9);
    }
    .mv-mask .pc { font-size: 13px; }
    .mv-mask .blk { opacity: .45; animation: mvBlink 1.8s ease-in-out infinite; }
    @keyframes mvBlink { 0%,100%{opacity:.35} 50%{opacity:.95} }

    /* 下段：左小標題+切換，右規格 */
    .meta-row {
      position: relative; z-index: 4;
      display: grid; grid-template-columns: 1fr auto;
      gap: clamp(24px, 5vw, 80px); align-items: end;
    }
    .sub {
      font-family: var(--hk-font-sans); font-weight: bold;
      font-size: clamp(19px, 2.4vw, 32px); line-height: 1.18;
      letter-spacing: -0.01em; text-decoration: underline;
      color: var(--hk-ivory); max-width: 15em;
    }
    .switch { margin-top: 14px; font-size: 13px; }
    .switch button {
      appearance: none; border: 0; background: none; cursor: pointer;
      font-family: var(--hk-font-mono); font-size: 13px;
      color: rgba(244,242,240,.55); padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color .2s, border-color .2s;
      touch-action: manipulation;
    }
    .switch button:hover { color: var(--hk-gold); }
    .switch button.on { color: var(--hk-ivory); border-bottom-color: var(--hk-ivory); }
    .switch .sep { color: rgba(244,242,240,.35); margin: 0 8px; }
    .hint { margin-top: 8px; font-size: 11px; color: rgba(244,242,240,.5); }

    .specs {
      font-family: var(--hk-font-mono); font-size: 12.5px; line-height: 1.9;
      letter-spacing: -0.005em; white-space: pre;
      color: rgba(244,242,240,.88);
      text-align: left;
    }

    /* ===== 手機：header 下 2/3 標題+詩句+戒指，下 1/3 = 左副標題+戒指名 / 右資訊 ===== */
    @media (max-width: 767px) and (orientation: portrait) {
      html, body { overflow: hidden; }
      .stage {
        position: fixed; inset: 0; left: 0; transform: none;
        height: 100dvh;
        padding: calc(var(--hk-bar-h) + 12px) 20px 16px;
      }
      .hero { flex: 2; }
      h1 { font-size: min(16vw, 96px); white-space: normal; text-align: left; line-height: 0.88; }
      .haiku { font-size: 13px; line-height: 1.85; }
      .meta-row {
        flex: 1; min-height: 0;
        grid-template-columns: 1fr auto; gap: 14px;
        align-items: end; align-content: end;
      }
      .sub { font-size: 16px; max-width: none; line-height: 1.2; }
      .switch { margin-top: 8px; font-size: 12px; }
      .hint { display: none; }
      .specs { font-size: 9.5px; line-height: 1.75; }
    }
  </style>
</head>
<body>

  <main class="stage">
    <div class="hero">
      <div class="mv-wrap">
        <model-viewer id="mv"
          src="models/ring-camellia.glb"
          alt="hand-carved silver ring — camellia"
          camera-controls
          auto-rotate auto-rotate-delay="3500" rotation-per-second="14deg"
          interaction-prompt="none"
          exposure="1.15" shadow-intensity="0.5" shadow-softness="0.85"
          environment-image="neutral"
          loading="eager">
        </model-viewer>
        <div class="mv-mask" id="mvMask" aria-hidden="true">
          <div class="txt"><span id="mvCoord">22.196545
113.545321</span>
<span class="blk">recalibrating</span> <span class="pc" id="mvPct">0%</span></div>
        </div>
      </div>

      <div class="title-block">
        <h1 id="title">reimagined.</h1>
        <p class="haiku" lang="ja">さびしさや　一尺消えて　ゆくほたる</p>
      </div>
    </div>

    <div class="meta-row">
      <div class="left">
        <h2 class="sub" id="sub">every piece designed, cast &amp; polished to perfect — all by local masters.</h2>
        <div class="switch" id="switch">
          <button class="on" data-ring="camellia">&gt;no.63-G camellia</button><span class="sep">/</span><button data-ring="signet">&gt;no.103-F signet with cross</button>
        </div>
        <p class="hint">&gt;drag to rotate · pinch to zoom <span class="blink-block">■</span></p>
      </div>
      <div class="specs" id="specs"></div>
    </div>
  </main>

  <script>
  window.addEventListener('DOMContentLoaded', function () {
    var mv = document.getElementById('mv');
    var mask = document.getElementById('mvMask');
    var pct = document.getElementById('mvPct');
    var coord = document.getElementById('mvCoord');
    var specsEl = document.getElementById('specs');

    /* ===== 兩隻戒指嘅資料（佔位文案，隨時改） ===== */
    var RINGS = {
      camellia: {
        src: 'models/ring-camellia.glb',
        specs: [
          'OBJECT   no.63-G — camellia ring',
          'BODY     sterling silver 925',
          'DESIGNER Alexandra',
          'SIZE     made to order',
          'ORIGIN   Victoria B.C.',
          'STATUS   ask roger for detail ■'
        ].join('\n')
      },
      signet: {
        src: 'models/ring-signet.glb',
        specs: [
          'OBJECT   no.103-F — signet ring',
          'BODY     sterling silver 925',
          'DESIGNER Alexandra',
          'SIZE     made to order',
          'ORIGIN   Victoria B.C.',
          'STATUS   ask roger for detail ■'
        ].join('\n')
      }
    };

    function setSpecs(key) {
      /* 先跑解碼（純文字），完成後把結尾方塊換成閃動 span */
      specsEl.textContent = RINGS[key].specs;
      if (window.HikkiCrack) window.HikkiCrack.startOn(window.HikkiCrack.collect(specsEl), { budgetMs: 500 });
      setTimeout(function () {
        specsEl.innerHTML = RINGS[key].specs
          .replace(/[&<>]/g, function (m) { return { '&':'&amp;','<':'&lt;','>':'&gt;' }[m]; })
          .replace('■', '<span class="blink-block">■</span>');
      }, 620);
    }

    /* ===== 載入遮罩：recalibrating % ===== */
    function newCoords() {
      coord.textContent = (22.10 + Math.random() * 0.13).toFixed(6) + '\n' +
                          (113.49 + Math.random() * 0.12).toFixed(6);
    }
    function showMask() {
      newCoords();
      pct.textContent = '0%';
      mask.classList.remove('off');
    }
    mv.addEventListener('progress', function (e) {
      var p = Math.round((e.detail.totalProgress || 0) * 100);
      pct.textContent = p + '%';
      if (p >= 100) setTimeout(function () { mask.classList.add('off'); }, 250);
    });
    mv.addEventListener('load', function () { mask.classList.add('off'); });
    mv.addEventListener('error', function () {
      pct.textContent = 'signal lost';
    });

    /* ===== 切換戒指 ===== */
    document.getElementById('switch').addEventListener('click', function (e) {
      var b = e.target.closest('button');
      if (!b) return;
      var key = b.dataset.ring;
      document.querySelectorAll('.switch button').forEach(function (x) { x.classList.remove('on'); });
      b.classList.add('on');
      showMask();
      mv.src = RINGS[key].src;
      setSpecs(key);
    });

    /* 開場：標題+小標題解碼，規格入場 */
    var C = window.HikkiCrack;
    if (C) {
      C.startOn([].concat(
        C.collect(document.getElementById('title')),
        C.collect(document.getElementById('sub'))
      ));
    }
    setSpecs('camellia');
  });
  </script>
</body>
</html>
